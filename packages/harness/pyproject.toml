[project]
name = "harness"
version = "0.1.0"
description = "Kernel package for a self-evolving agentic harness"
requires-python = ">=3.12"
dependencies = [
  "asyncpg>=0.30.0",
  "httpx[http2]>=0.28.0",
  "orjson>=3.10.0",
  "pydantic>=2.8.0",
  "pydantic-settings>=2.4.0",
  "pyyaml>=6.0.2",
  "structlog>=24.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["harness"]
