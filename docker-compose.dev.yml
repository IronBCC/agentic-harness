services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: harness
      POSTGRES_USER: harness
      POSTGRES_PASSWORD: harness
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harness -d harness"]
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:

